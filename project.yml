name: GRID
options:
  bundleIdPrefix: com.kentaro
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: ja

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: "YES"

targets:
  GRID:
    type: application
    platform: iOS
    sources:
      - path: GRID
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kentaro.GRID
        INFOPLIST_FILE: GRID/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    info:
      path: GRID/Info.plist
      properties:
        CFBundleDisplayName: GRID
        CFBundleName: GRID
        CFBundleDevelopmentRegion: ja
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: "トレーニング写真を追加するために使用します"
        NSPhotoLibraryAddUsageDescription: "トレーニング写真を保存するために使用します"
        NSCameraUsageDescription: "トレーニング写真を撮影するために使用します"
